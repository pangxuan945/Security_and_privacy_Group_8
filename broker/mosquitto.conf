
# ==============================================================================
# SmartNest CW2 — Hardened Mosquitto broker configuration
# ==============================================================================
# Defense D1: MQTT over TLS with mandatory client certificates.
# Replaces the previous plaintext 1883 listener.
# ==============================================================================

# ── TLS listener ──────────────────────────────────────────────────────────────
listener 8883
protocol mqtt

# Server-side certificate material
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile  /mosquitto/certs/broker.key

# Require clients to present a certificate signed by our CA.
# Any connection without a valid client cert is rejected during the TLS
# handshake — attackers never even reach the MQTT layer.
require_certificate true

# Use the CN field of the client certificate as the MQTT username.
# This allows per-identity ACLs (e.g. lock_01 can only publish to
# home/lock/status, not to home/lock/command).
use_identity_as_username true

# ── Access control ────────────────────────────────────────────────────────────
# With identity-as-username enabled we can enforce least privilege.
# Anonymous connections are refused.
allow_anonymous false
acl_file /mosquitto/config/acl.conf

# ── Logging & persistence ─────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
connection_messages true
