
# SmartNest MQTT Broker - INTENTIONALLY INSECURE for attack demonstration
# No TLS, no authentication, no ACL

# Bind explicitly to all IPv4 interfaces so sibling containers on the
# Docker bridge network can connect reliably.
listener 1883 0.0.0.0
socket_domain ipv4
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
