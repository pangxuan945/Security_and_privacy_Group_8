
# ==============================================================================
# SmartNest ACL — least-privilege topic permissions
# ==============================================================================
# Username = CN from the client certificate (because use_identity_as_username)
# ==============================================================================

# The device simulator can publish device state and receive commands
user device_simulator
topic write home/lock/status
topic write home/light/status
topic write home/alarm/status
topic write home/lock/event
topic write home/light/event
topic write home/alarm/event
topic write home/heartbeat
topic read  home/lock/command
topic read  home/light/command
topic read  home/alarm/command

# The web panel subscribes to everything and issues commands
user web_panel
topic read  home/#
topic write home/lock/command
topic write home/light/command
topic write home/alarm/command

# The IDS is read-only: it monitors everything but cannot publish device state
user ids_monitor
topic read  home/#
topic write home/alert
