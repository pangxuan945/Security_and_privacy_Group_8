
# ==============================================================================
# SmartNest CW2 — Docker Compose with TLS defense enabled
# ==============================================================================
# Changes vs CW1:
#   1. Broker port 1883 closed; 8883 (TLS) exposed instead
#   2. defense/certs/ mounted into every container that needs TLS
#   3. ACL file mounted into broker
# ==============================================================================

services:

  broker:
    image: eclipse-mosquitto:2
    container_name: smartnest-broker
    ports:
      - "8883:8883"                             # TLS only
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./broker/acl.conf:/mosquitto/config/acl.conf
      - ./defense/certs:/mosquitto/certs:ro     # read-only for safety
      - broker-data:/mosquitto/data
      - broker-log:/mosquitto/log
    restart: unless-stopped
    networks:
      - smartnest

  devices:
    build: ./devices
    container_name: smartnest-devices
    environment:
      - MQTT_BROKER=broker
      - MQTT_PORT=8883
      - CA_CERT=/certs/ca.crt
      - CLIENT_CERT=/certs/device_simulator.crt
      - CLIENT_KEY=/certs/device_simulator.key
    volumes:
      - ./defense/certs:/certs:ro
    depends_on:
      - broker
    restart: unless-stopped
    networks:
      - smartnest

  web:
    build: ./web
    container_name: smartnest-web
    ports:
      - "5001:5000"
    environment:
      - MQTT_BROKER=broker
      - MQTT_PORT=8883
      - EXTERNAL_PORT=5001
      - CA_CERT=/certs/ca.crt
      - CLIENT_CERT=/certs/web_panel.crt
      - CLIENT_KEY=/certs/web_panel.key
    volumes:
      - ./defense/certs:/certs:ro
    depends_on:
      - broker
    restart: unless-stopped
    networks:
      - smartnest

volumes:
  broker-data:
  broker-log:

networks:
  smartnest:
    driver: bridge
